<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiarka Store - Managed by BAGUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fafafa; }
        .unit-card {
            background: linear-gradient(145deg, #0f0f0f, #151515);
            border: 1px solid #1f1f1f;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .unit-card:hover {
            border-color: #22c55e;
            transform: scale(1.02);
            box-shadow: 0 10px 30px -10px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body class="font-sans antialiased border-t-4 border-green-600">

    <div class="max-w-md mx-auto px-6 py-16">
        
        <header class="mb-12">
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">
                BAGUS <span class="text-green-600">STORE</span>
            </h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.5em] mt-2 font-bold leading-none">
                Bantosan Garut Squad Unit
            </p>
            <div class="h-[1px] w-12 bg-green-600 mt-6"></div>
        </header>

        <div class="space-y-4">
            
            <a href="https://twinstech.kiarka.id" class="unit-card p-6 rounded-[2rem] block group">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-lg font-black uppercase tracking-tight group-hover:text-green-500 transition-colors">Twinstech</h2>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase font-semibold">Cloud & Digital Infrastructure</p>
                    </div>
                    <span class="bg-white/5 p-2 rounded-full text-xs text-gray-400">01</span>
                </div>
            </a>

            <a href="/mieayam" class="unit-card p-6 rounded-[2rem] block group">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-lg font-black uppercase tracking-tight group-hover:text-green-500 transition-colors">F&B Unit</h2>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase font-semibold">Managed Culinary Supply</p>
                    </div>
                    <span class="bg-white/5 p-2 rounded-full text-xs text-gray-400">02</span>
                </div>
            </a>

            <a href="https://garu7.hamb4allaah.my.id" class="unit-card p-6 rounded-[2rem] block group">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-lg font-black uppercase tracking-tight group-hover:text-green-500 transition-colors">GARU7 Service</h2>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase font-semibold">Local Logistics & Transport</p>
                    </div>
                    <span class="bg-white/5 p-2 rounded-full text-xs text-gray-400">03</span>
                </div>
            </a>

        </div>

        <footer class="mt-24 pt-10 border-t border-white/5">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[8px] text-gray-600 uppercase tracking-widest font-bold">Part of Ecosystem</p>
                    <p class="text-xs font-black text-white mt-1">KIARKA DIGITAL</p>
                </div>
                <a href="https://kiarka.id" class="text-[10px] bg-white text-black px-4 py-2 rounded-full font-black uppercase tracking-tighter hover:bg-green-600 hover:text-white transition-all">
                    Back to HQ
                </a>
            </div>
        </footer>

    </div>

</body>
</html>
